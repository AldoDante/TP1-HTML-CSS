    <section id="contacto">
      <h2>Contacto</h2>
      <form action="#modal-exito" class="formulario">
        <div class="grupo">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" class="campo" required />
        </div>
        <div class="grupo">
          <label for="email">Email:</label>
          <input type="email" id="email" class="campo" required />
        </div>
        <div class="grupo ancho-completo">
          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" class="campo" required rows="3"></textarea>
        </div>
        <button type="submit" class="btn-enviar ancho-completo">Enviar</button>
      </form>
    </section>

  </div>

  <div id="modal-exito" class="modal">
    <div class="spinner"></div>
    <div class="mensaje">
      <h3>¡Mensaje Enviado!</h3>
      <p>Un agente se comunicará a la brevedad.</p>
      <a href="contacto.html">Cerrar</a>
    </div>
  </div>
